<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagen en Pantalla Completa</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: black; /* Fondo negro para mejor visualización si la imagen no cubre todo */
        }
        img {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Ajusta la imagen para que quepa completamente sin cortar */
            object-position: center; /* Centra la imagen */
        }
    </style>

    (function(c,l,a,r,i,t,y){

    })(window, document, "clarity", "script", "w2uehsanga");
</script>
</head>
<body>
    <img src="red.png" alt="Imagen roja en pantalla completa">
</body>
</html>
